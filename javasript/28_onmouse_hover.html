<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onmouse hover</title>
    <h2 onmouseover=" changeColor(this)" onmouseout="resetColor(this)">
  
        hover over me!
    </h2>
    <script>
        function changeColor(element)
        {
            element.style.color="red";
        }
         function resetColor(element)
        {
            element.style.color="black";
        }
    </script>
</head>
<body>
    
</body>
</html>
