<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         article
        {
          background-color: black;
          color: black;
          border: 1px solid black;
          width: 80%;
          margin: auto;
          display: grid;
          /* gried-template-colomns: 100px 500px 100px 100px 200px */                 
          grid-template-columns: 10% 28% 32%  15%  15%;
          grid-template-rows: repeat(7, 50px);
        }
       
        div       
        {
                  border: 1px solid black;
                  display: flex;
                  align-items: center;
                  padding-left: 20px;
                  color: blue;
                  background-color: brown;
        }
        div:nth-of-type(-n+5)
          {
            justify-content: end;
            background-color: black;
            color:brown;
            padding-right: 10px;
            font-size: x-large;
          }
          div:nth-of-type(-n+2)
          {
            justify-content: start;
          }
          div:hover
        {
            background-color:white;
            color: blue;
        }

    </style>
</head>
