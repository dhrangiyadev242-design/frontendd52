<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .contact-section {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }
        .contact-section h1 {
            color: #0d6efd;
            margin-bottom: 10px;
        }
        .contact-section p {
            color: #666;
            margin-bottom: 25px;
        }
        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
        }
        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: #0d6efd;
        }
        .contact-form button {
            width: 100%;
            background: #0d6efd;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            transition: .3s;
        }
        .contact-form button:hover {
            background: #084298;
            transform: scale(1.02);
        }
        .footer{
    background:#212529;
    color:white;
    padding:25px 15px;
    margin-top:30px;
}

.footer h4{
    font-size:18px;
}

.footer p{
    font-size:14px;
}

.social-icons i{
    font-size:20px;
    margin-right:10px;
}
    </style>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand fw-bold" href="/">
                Smart Shop
            </a>

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/products">Products</a>
                <a class="nav-link" href="/cart">Cart</a>
                <a class="nav-link" href="/about">About</a>
                <a class="nav-link active" href="/contact">
                    Contact
                </a>
            </div>
        </div>
    </nav>
    <div class="contact-section">
        <h1>Let's Connect</h1>
        <p>
            Have a question or project idea?
            Feel free to contact us.
        </p>
        <form class="contact-form">
            <input type="text" placeholder="your name">

            <input type="email" placeholder="your email">
            <textarea rows="4" placeholder="Enter your message">

       </textarea>
            <button>
                Send Message
            </button>

        </form>

    </div>
     <!---footer--->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-md-4">
                    <h4>Smart Shop</h4>

                    <p>
                        Quality Products At Best Prices.
                    </p>


                </div>
                <div class="col-md-4">

                    <h4>Quick Links</h4>

                    <p><a href="/">Home</a></p>
                    <p><a href="/products">Products</a></p>
                    <p><a href="/cart">Cart</a></p>
                    <p><a href="/contact">Contact</a></p>

                </div>
                <div class="col-md-4">

                    <h4>Follow Us</h4>

                    <div class="social-icons">
                        <i class="bi bi-facebook"></i>
                        <i class="bi bi-instagram"></i>
                        <i class="bi bi-linkedin"></i>
                        <i class="bi bi-github"></i>
                    </div>
                    <p class="mt-3">
                        support@smartshop.com
                    </p>

                </div>

            </div>
            <hr>
            <p class="text-center">
                © 2026 Smart Shop. All Rights Reserved.
            </p>


    </footer>

    </div>


</body>

</html>
