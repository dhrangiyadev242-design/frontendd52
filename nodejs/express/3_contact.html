<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
    <style>
         .navbar{
    background: #0d6efd;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
}

.logo{
    color: white;
    font-size: 24px;
    font-weight: bold;
}

.menu a{
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 18px;
    transition: 0.3s;
}

.menu a:hover{
    color: yellow;
}
/* Projects */

.page-title{
    text-align: center;
    margin-top: 30px;
    color: #0d6efd;
}

.project-container{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 40px;
}

.project-card{
    width: 300px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.project-card:hover{
    transform: translateY(-5px);
}

/* Contact */

.contact-box{
    width: 450px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.contact-box input,
.contact-box textarea{
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

.contact-box button{
    width: 100%;
    padding: 12px;
    border: none;
    background: #0d6efd;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.contact-box button:hover{
    background: #084298;
}
    </style>
</head>
<body>
    <nav class="navbar">
    <div class="logo">Lalji Portfolio</div>

    <div class="menu">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/skills">Skills</a>
        <a href="/projects">Projects</a>
        <a href="/contact">Contact</a>
    </div>
</nav>
<h1 class="page-title">Contact Me</h1>
<div class="contact-box">
    <input type="text" placeholder="Lalji Dhrangiya">
    <input type="email" placeholder="LaljiDhrangiya47@gmail.com" >
     <textarea rows="5" placeholder=" Feel free to share your project requirements, questions, or collaboration ideas."></textarea>
       <button>Send Message</button>


</div>
    
</body>
</html>
