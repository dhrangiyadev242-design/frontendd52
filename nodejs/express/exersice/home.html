<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
   rel="stylesheet">
   <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
}

.navbar{
    background:#111 !important;
    padding:15px 0;
}

.navbar-brand{
    font-size:28px;
    font-weight:bold;
    color:#ff3c00 !important;
}
.nav-link{
    transition:0.3s;
}

.nav-link:hover{
    color:#ff3c00 !important;
}

.hero{
    height:90vh;
    background:url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
}

.hero h1{
    font-size:70px;
    font-weight:bold;
}

.hero p{
    font-size:22px;
}

.btn-custom{
    background:#ff3c00;
    color:white;
    padding:12px 30px;
    border:none;
    border-radius:5px;
    text-decoration:none;
    transition:0.3s;
}

.btn-custom:hover{
    background:#d63000;
}

.section{
    padding:80px 0;
}

.card{
    border:none;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    height:300px;
    object-fit:cover;
}

.footer{
    background:black;
    color: white;
    text-align:center;
    padding:25px;
    margin-top:auto;
}
</style>
</head>
<body>
  


<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">PowerGym</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
        <li class="nav-item"><a class="nav-link" href="/services">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="/trainers">Trainers</a></li>
        <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>
<section class="hero">
    <div>
        <h1>Build Your Dream Body</h1>
        <p>Fitness • Strength • Motivation</p>
        <a href="/services" class="btn-custom">Join Now</a>
    </div>
</section>
<!-- Footer -->
<footer class="footer">
    <h4>PowerGym</h4>
    <p>Train Hard • Stay Strong • Be Fit</p>
    <p>© 2026 PowerGym. All Rights Reserved.</p>
</footer>

</body>
</html>
